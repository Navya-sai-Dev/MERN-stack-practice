<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERN Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <img src="https://w0.peakpx.com/wallpaper/102/324/HD-wallpaper-anime-girl-anime-japan.jpg" class="profile-img">
    <span class="badge">Available for Hire</span>
  </div>

  <!-- Info -->
  <div class="info">
    <h1>Navya Reddy</h1>
    <h3>MERN Stack Developer</h3>
    <p class="location">📍 India / Remote</p>
  </div>

  <!-- Skills -->
  <div class="skills">
    <span>MongoDB</span>
    <span>Express</span>
    <span>React</span>
    <span>Node.js</span>
  </div>

  <!-- Bio -->
  <p class="bio">
    Building full-stack web apps with clean UI & scalable backend.
  </p>

  <!-- Buttons -->
  <div class="buttons">
    <button class="primary">View Portfolio</button>
    <button>GitHub</button>
    <button>Contact</button>
  </div>

</div>

</body>
</html>
